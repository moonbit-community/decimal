name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  stable-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu-latest
          - name: macos-latest
          - name: windows-latest

    runs-on: ${{ matrix.os.name }}

    env:
      OS_PLATFORM: ${{ matrix.os.name }}

    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os.name != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        if: ${{ matrix.os.name == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSVC
        if: ${{ matrix.os.name == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: moon check
        run: moon check

      - name: moon test
        run: |
          moon test --target all --serial --release
          moon test --target all --serial

      - name: moon test (native)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 5
          command: |
            moon test --target native --release
            moon test --target native

      - name: interface up to date
        run: |
          moon info
          git diff --exit-code

      - name: format diff
        run: |
          moon fmt
          git diff --exit-code

  nightly-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu-latest
          - name: macos-latest
          - name: windows-latest

    runs-on: ${{ matrix.os.name }}

    env:
      OS_PLATFORM: ${{ matrix.os.name }}

    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os.name != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        env:
          MOONBIT_INSTALL_VERSION: nightly
        if: ${{ matrix.os.name == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSVC
        if: ${{ matrix.os.name == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: moon check
        run: moon check

      - name: moon test
        run: |
          moon test --target all --serial --release
          moon test --target all --serial

      - name: moon test (native)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 5
          command: |
            moon test --target native --release
            moon test --target native

      - name: interface up to date
        run: |
          moon info
          git diff --exit-code

      - name: format diff
        run: |
          moon fmt
          git diff --exit-code
